<!DOCTYPE html>
<html>
<head>
<title>TRON: AED Protocol</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
color:#00ffff;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:22px;
text-shadow:0 0 10px cyan;
}
</style>
</head>

<body>

<div id="ui">Initializing Grid...</div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* --- GAME STATE --- */
let state="cutscene";
let timer=0;
let lives=3;
let level=1;

/* --- GRID & MOVEMENT --- */
const grid=6;
const spawnZoneRadius=140;
let spawnSafeUntil=0;

const dirs=[
{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
];

/* --- PLAYER --- */
let player = {
x:Math.floor(canvas.width/2/grid)*grid,
y:Math.floor(canvas.height/2/grid)*grid,
dir:{x:1,y:0},
trail:[],
color:"#00ffff"
};

/* --- ENEMIES --- */
let enemies = [];
function createEnemy(){
let x,y;
do{
x=Math.random()*canvas.width;
y=Math.random()*canvas.height;
} while(Math.hypot(x-canvas.width/2,y-canvas.height/2)<spawnZoneRadius);
return{
x:x,
y:y,
dir:dirs[Math.floor(Math.random()*4)],
trail:[],
color:"#ff0033",
turnTimer:0
};
}
function spawnEnemies(){
enemies=[];
let count=2+level;
for(let i=0;i<count;i++){
enemies.push(createEnemy());
}
}
spawnEnemies();

/* --- AED PATH --- */
let aed={x:0,y:0};
let route=[];
let signs=[];

function generateRoute(){
route=[];
signs=[];
let x=player.x;
let y=player.y;
route.push({x,y});

let segments=8+Math.floor(Math.random()*6);
let lastDir=null;

for(let i=0;i<segments;i++){
let dir;
do{
dir=dirs[Math.floor(Math.random()*4)];
}while(lastDir && dir.x===-lastDir.x && dir.y===-lastDir.y);
lastDir=dir;

let length=30+Math.floor(Math.random()*50);
for(let j=0;j<length;j++){
x+=dir.x*grid;
y+=dir.y*grid;
x=Math.max(20,Math.min(canvas.width-20,x));
y=Math.max(20,Math.min(canvas.height-20,y));
route.push({x,y});
}
}

aed=route[route.length-1];
if(Math.hypot(aed.x-canvas.width/2,aed.y-canvas.height/2)<spawnZoneRadius){
generateRoute();
return;
}

/* Signs at turns */
for(let i=1;i<route.length-1;i++){
let prev=route[i-1];
let cur=route[i];
let next=route[i+1];

let dx1=cur.x-prev.x;
let dy1=cur.y-prev.y;
let dx2=next.x-cur.x;
let dy2=next.y-cur.y;

if(dx1!==dx2 || dy1!==dy2){
let angle=Math.atan2(dy2,dx2);
signs.push({x:cur.x,y:cur.y,angle:angle});
}
}
}

generateRoute();

/* --- INPUT --- */
let turnCooldown=120;
let lastTurnTime=0;
document.addEventListener("keydown",e=>{
let now=Date.now();
if(state!=="game" && state!=="gameover")return;

if(now-lastTurnTime<turnCooldown) return;

if(e.key==="ArrowUp" && player.dir.y===0){ player.dir={x:0,y:-1}; lastTurnTime=now; }
if(e.key==="ArrowDown" && player.dir.y===0){ player.dir={x:0,y:1}; lastTurnTime=now; }
if(e.key==="ArrowLeft" && player.dir.x===0){ player.dir={x:-1,y:0}; lastTurnTime=now; }
if(e.key==="ArrowRight" && player.dir.x===0){ player.dir={x:1,y:0}; lastTurnTime=now; }

if(state==="gameover" && e.key==="r") restart();
});

/* --- RESTART / NEXT LEVEL --- */
function restart(){
level=1;
lives=3;
player=createPlayer();
player.trail=[];
spawnEnemies();
generateRoute();
spawnSafeUntil=Date.now()+400;
state="cutscene";
timer=0;
}

function nextLevel(){
level++;
player=createPlayer();
player.trail=[];
spawnEnemies();
generateRoute();
spawnSafeUntil=Date.now()+400;
}

/* --- DRAW FUNCTIONS --- */
function drawTrail(trail,color){
ctx.strokeStyle=color;
ctx.lineWidth=4;
ctx.shadowBlur=15;
ctx.shadowColor=color;
ctx.beginPath();
for(let i=0;i<trail.length;i++){
let p=trail[i];
if(i===0) ctx.moveTo(p.x,p.y);
else ctx.lineTo(p.x,p.y);
}
ctx.stroke();
}

function drawAEDPath(){
if(signs.length<2) return;
ctx.strokeStyle=player.color;
ctx.lineWidth=2;
ctx.shadowBlur=10;
ctx.shadowColor=player.color;
ctx.beginPath();
ctx.moveTo(signs[0].x,signs[0].y);
for(let i=1;i<signs.length;i++){
ctx.lineTo(signs[i].x,signs[i].y);
}
ctx.stroke();
}

function drawBike(x,y,color){
ctx.fillStyle=color;
ctx.shadowBlur=20;
ctx.shadowColor=color;
ctx.beginPath();
ctx.arc(x,y,6,0,Math.PI*2);
ctx.fill();
}

function drawAED(){
ctx.strokeStyle="#00ff00";
ctx.shadowBlur=20;
ctx.shadowColor="#00ff00";
ctx.strokeRect(aed.x-15,aed.y-15,30,30);
ctx.fillStyle="#00ff00";
ctx.fillText("AED",aed.x-15,aed.y+35);
}

function drawSigns(){
ctx.fillStyle="#ff0033";
ctx.shadowBlur=15;
ctx.shadowColor="#ff0033";
for(let s of signs){
ctx.save();
ctx.translate(s.x,s.y);
ctx.rotate(s.angle);
ctx.beginPath();
ctx.moveTo(15,0);
ctx.lineTo(-15,-10);
ctx.lineTo(-15,10);
ctx.closePath();
ctx.fill();
ctx.restore();
}
}

/* --- COLLISION HELPERS --- */
function pointToSegmentDistance(px,py,x1,y1,x2,y2){
let A=px-x1,B=py-y1,C=x2-x1,D=y2-y1;
let dot= A*C + B*D;
let len_sq = C*C + D*D;
let param = len_sq!==0 ? dot/len_sq : -1;
let xx,yy;
if(param<0){ xx=x1; yy=y1; }
else if(param>1){ xx=x2; yy=y2; }
else{ xx=x1 + param*C; yy=y1 + param*D; }
let dx = px-xx, dy = py-yy;
return Math.sqrt(dx*dx + dy*dy);
}

function playerNearAEDPath(){
let buffer=20;
for(let i=0;i<signs.length-1;i++){
let p1=signs[i], p2=signs[i+1];
if(pointToSegmentDistance(player.x,player.y,p1.x,p1.y,p2.x,p2.y)<buffer) return true;
}
return false;
}

/* --- BIKE MOVEMENT --- */
function moveBike(b){
b.trail.push({x:b.x,y:b.y});
b.x+=b.dir.x*grid;
b.y+=b.dir.y*grid;
if(b.x<0)b.x=canvas.width;
if(b.x>canvas.width)b.x=0;
if(b.y<0)b.y=canvas.height;
if(b.y>canvas.height)b.y=0;

if(b!==player && b.trail.length>200) b.trail.shift();
}

function updateEnemies(){
for(let e of enemies){
e.turnTimer++;
if(e.turnTimer>60-(level*3)){
e.dir=dirs[Math.floor(Math.random()*4)];
e.turnTimer=0;
}
moveBike(e);
}
}

/* --- COLLISION CHECK --- */
function collisionCheck(){
if(Date.now()<spawnSafeUntil) return;
if(playerNearAEDPath()) return; // invulnerable near AED path

for(let e of enemies){
for(let p of e.trail){
if(Math.hypot(player.x-p.x,player.y-p.y)<8){
lives--;
if(lives<=0) state="gameover";
else{
player=createPlayer();
player.trail=[];
spawnSafeUntil=Date.now()+400;
}
return;
}
}
}
}

/* --- CUTSCENE --- */
function cutscene(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#ff0040";
ctx.font="40px monospace";
ctx.textAlign="center";

if(timer<120) ctx.fillText("GRID COMBAT DETECTED",canvas.width/2,canvas.height/2);
else if(timer<240) ctx.fillText("YOU WERE DEREZZED",canvas.width/2,canvas.height/2);
else if(timer<360) ctx.fillText("MEDICAL PROTOCOL ACTIVATED",canvas.width/2,canvas.height/2);
else if(timer<480) ctx.fillText("LOCATE AED TO REVIVE",canvas.width/2,canvas.height/2);
else{
state="game";
document.getElementById("ui").innerText="Avoid Trails • Reach the AED";
}
timer++;
}

/* --- GAME --- */
function game(){
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,canvas.width,canvas.height);

drawUI();
drawAEDPath();
drawSigns();
drawAED();

moveBike(player);
updateEnemies();

drawTrail(player.trail,player.color);
drawBike(player.x,player.y,player.color);

for(let e of enemies){
drawTrail(e.trail,e.color);
drawBike(e.x,e.y,e.color);
}

collisionCheck();

let dist=Math.hypot(player.x-aed.x,player.y-aed.y);
if(dist<20){ nextLevel(); }
}

/* --- UI --- */
function drawUI(){
document.getElementById("ui").innerText=
"Level: "+level+
" | Lives: "+lives+
" | Hint: Follow the AED signs";
}

/* --- GAME OVER --- */
function gameover(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#ff0033";
ctx.font="60px monospace";
ctx.textAlign="center";
ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2-60);
ctx.font="30px monospace";
ctx.fillText("Hint: Follow the AED signs.",canvas.width/2,canvas.height/2);
ctx.font="22px monospace";
ctx.fillText("Reached Level "+level,canvas.width/2,canvas.height/2+40);
ctx.fillText("Press R to Restart",canvas.width/2,canvas.height/2+80);
}

/* --- MAIN LOOP --- */
function loop(){
if(state==="cutscene") cutscene();
if(state==="game") game();
if(state==="gameover") gameover();
requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
