<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Menu</title>
  <style>
    /* ── Page Layout ── */
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    nav {
      background-color: #16213e;
      padding: 20px 30px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 220px;
    }

    nav h2 {
      color: #e0e0e0;
      text-align: center;
      margin: 0 0 10px 0;
      font-size: 1.2rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid #0f3460;
      padding-bottom: 10px;
    }

    /* ── Base Button Style ── */
    .menu-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      letter-spacing: 0.5px;
    }

    .menu-btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .menu-btn:active {
      transform: translateY(0px);
      opacity: 1;
    }

    /* ── Button 1: Primary (Blue) ── */
    .btn-primary {
      background-color: #0f3460;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(15, 52, 96, 0.5);
    }

    /* ── Button 2: Success (Green) ── */
    .btn-success {
      background-color: #2ecc71;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(46, 204, 113, 0.4);
    }

    /* ── Button 3: Danger (Red) ── */
    .btn-danger {
      background-color: #e74c3c;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4);
    }

    /* ── Button 4: Warning (Orange) ── */
    .btn-warning {
      background-color: #f39c12;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(243, 156, 18, 0.4);
    }

    /* ── Button 5: Outline (Ghost) ── */
    .btn-outline {
      background-color: transparent;
      color: #e0e0e0;
      border: 2px solid #e0e0e0;
      box-shadow: none;
    }

    .btn-outline:hover {
      background-color: #e0e0e0;
      color: #1a1a2e;
    }

    /* ── Button 6: Gradient (Purple → Pink) ── */
    .btn-gradient {
      background: linear-gradient(135deg, #8e44ad, #e91e8c);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(142, 68, 173, 0.5);
    }
  </style>
</head>
<body>

  <nav>
    <h2>Menu</h2>

    <!-- Button 1: Primary -->
    <button class="menu-btn btn-primary" onclick="handleClick('Tron')">
      Tron
    </button>

    <!-- Button 2: Success -->
    <button class="menu-btn btn-success" onclick="handleClick('PacMan')">
      PacMan
    </button>

    <!-- Button 3: Danger -->
    <button class="menu-btn btn-danger" onclick="handleClick('Delete')">
      Mario
    </button>

    <!-- Button 4: Warning -->
    <button class="menu-btn btn-warning" onclick="handleClick('Tetris')">
      Tetris
    </button>

    <!-- Button 5: Outline / Ghost -->
    <button class="menu-btn btn-outline" onclick="handleClick('Pong')">
      Pong
    </button>

    <!-- Button 6: Gradient -->
    <button class="menu-btn btn-gradient" onclick="handleClick('Space Invaders')">
      Space Invaders
    </button>

  </nav>

  <script>
    // ── Customize button actions here ──
    function handleClick(action) {
      alert(`You clicked: ${action}`);
      // Replace alert() with your own logic, e.g.:
      // navigateTo(action), openModal(action), etc.
    }
  </script>

</body>
</html>
